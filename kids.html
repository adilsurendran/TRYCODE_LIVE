<!DOCTYPE html>
<html>
<head>
  <title>Women Collection</title>
  <link rel="stylesheet" href="women.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-black px-4">
  <a href="index.html" class="navbar-brand fw-bold">
  <h5 class="offcanvas-title brand m-0 d-flex align-items-center gap-2">
  <img src="./Vanta logo png.png" alt="" class="brand-logo">
  <img src="./vanta .png" alt="" class="brand-logo-nm">
</h5></a>

  <div class="d-flex align-items-center gap-3">
    <button onclick="goBack()" class="btn btn-outline-light btn-sm">← Back</button>
    <a href="cart.html" class="cart-icon text-light text-decoration-none">
  🛒 <span id="cartCount">0</span>
</a>
  </div>
</nav>

<!-- Search & Filter -->
<section class="container py-4">
  <div class="row g-3">
    <div class="col-md-6">
      <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
    </div>
    <div class="col-md-3">
      <select id="filterCategory" class="form-select">
        <option value="all">All</option>
        <option value="dress">Dress</option>
        <option value="top">Top</option>
      </select>
    </div>
  </div>
</section>

<!-- Products -->
<section class="container pb-5">
  <div class="row g-4 ">

    <!-- PRODUCT 1 -->
    <div class="col-md-3 col-6">
      <div class="card-custom p-3">
            <img src="https://images.pexels.com/photos/1488463/pexels-photo-1488463.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="women casual dress model" />
<div class="product-name">
            <h6 class="fw-bold  mb-1">Floral Midi Dress</h6>
            <p class="text-muted small mb-2">Women • Casual</p>
            <div class="d-flex justify-content-between align-items-center">
                <span class=" fw-bold product-price">₹1299</span>
              <span class="rating">4.6 ★</span>
            </div>
          </div>
        <div class="size-section">
  <label>Select Size:</label>

  <div class="size-options">
    <button type="button" class="size-btn">S</button>
    <button type="button" class="size-btn">M</button>
    <button type="button" class="size-btn">L</button>
    <button type="button" class="size-btn">XL</button>
    <button type="button" class="size-btn">XXL</button>
  </div>
</div>

        <button class="btn btn-outline-light w-100 mt-2 addCart">
          Add to Cart
        </button>

        <button class="btn btn-light w-100 mt-2 buyNow">
          Buy Now
        </button>
      </div>
    </div>
    <!-- PRODUCT 2 -->
    <div class="col-md-3 col-6">
      <div class="card-custom p-3">
            <img src="https://images.pexels.com/photos/1488463/pexels-photo-1488463.jpeg?auto=compress&cs=tinysrgb&w=1200" alt="women casual dress model" />
<div class="product-name">
            <h6 class="fw-bold  mb-1">Floral Midi Dress</h6>
            <p class="text-muted small mb-2">Women • Casual</p>
            <div class="d-flex justify-content-between align-items-center">
<span class="fw-bold product-price">₹ 1,499</span>
              <span class="rating">4.6 ★</span>
            </div>
          </div>
        <div class="size-section">
  <label>Select Size:</label>

  <div class="size-options">
    <button type="button" class="size-btn">S</button>
    <button type="button" class="size-btn">M</button>
    <button type="button" class="size-btn">L</button>
    <button type="button" class="size-btn">XL</button>
    <button type="button" class="size-btn">XXL</button>
  </div>
</div>

        <button class="btn btn-outline-light w-100 mt-2 addCart">
          Add to Cart
        </button>

        <button class="btn btn-light w-100 mt-2 buyNow">
          Buy Now
        </button>
      </div>
    </div>

  </div>
</section>




<script src="women.js"></script>
</body>
</html>
