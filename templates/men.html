<!DOCTYPE html>
<html>

<head>
  <title>Men Collection</title>
  <link rel="stylesheet" href="../static/css/index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-black px-4">
    <a href="index.html" class="navbar-brand fw-bold">
      <h5 class="offcanvas-title brand m-0 d-flex align-items-center gap-2">
        <img src="../static/media/Vanta logo png.png" alt="" class="brand-logo">
        <img src="../static/media/vanta .png" alt="" class="brand-logo-nm">
      </h5>
    </a>

    <div class="d-flex align-items-center gap-3">
      <button onclick="goBack()" class="btn btn-outline-light btn-sm">← Back</button>
      <a href="cart.html" class="cart-icon text-light text-decoration-none">
        🛒 <span id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <!-- Search & Filter -->
  <section class="container py-4">
    <div class="row g-3">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
      </div>
      <div class="col-md-3">
        <select id="filterCategory" class="form-select">
          <option value="all">All</option>
          <option value="dress">Dress</option>
          <option value="top">Top</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Products -->
  <section class="container pb-5">
    <div class="row g-4 ">

      <!-- PRODUCT 2 (Men Linen Shirt) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=2" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img src="https://5.imimg.com/data5/KK/YQ/MY-10139824/mens-linen-casual-shirt.jpg"
              alt="men shirt studio model" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Men Linen Shirt</h6>
              <p class="text-muted small mb-2">Men • Summer</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class=" fw-bold product-price">₹899</span>
                <span class="rating">4.5 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- PRODUCT 5 (Cotton Crew Tee) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=5" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img
              src="https://images.pexels.com/photos/2983464/pexels-photo-2983464.jpeg?auto=compress&cs=tinysrgb&w=1200"
              alt="men casual tshirt" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Cotton Crew Tee</h6>
              <p class="text-muted small mb-2">Men • Casual</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold product-price">₹ 599</span>
                <span class="rating">4.5 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- PRODUCT 10 (Denim Jacket) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=10" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img
              src="https://images.pexels.com/photos/2857037/pexels-photo-2857037.jpeg?auto=compress&cs=tinysrgb&w=1200"
              alt="men denim jacket" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Denim Jacket</h6>
              <p class="text-muted small mb-2">Men • Street</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold product-price">₹ 1,499</span>
                <span class="rating">4.5 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>

    </div>
  </section>




  <script src="../static/script/women.js"></script>
</body>

</html>
