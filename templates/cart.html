<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopping Cart - Vanta The Posh</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root {
      --bg: #0b0f17;
      --panel: #080a11;
      --text: #e5e7eb;
      --muted: #9ca3af;
      --border: rgba(255, 255, 255, .08);
      --accent: #ff3d6e;
    }

    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }

    body.light-theme {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #475569;
      --border: rgba(15, 23, 42, .10);
    }

    /* Navbar */
    .navbar {
      background: rgba(11, 15, 23, .85) !important;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 10px 0;
    }

    body.light-theme .navbar {
      background: rgba(255, 255, 255, .9) !important;
    }

    .brand-logo {
      height: 40px;
      width: auto;
      object-fit: contain;
    }

    .brand-logo-nm {
      height: 40px;
      width: auto;
      object-fit: contain;
      transform: scale(2.5);
      transform-origin: left center;
      margin-left: -15px;
      filter: brightness(0) invert(1);
    }

    body.light-theme .brand-logo-nm {
      filter: none;
    }

    .navbar-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    @media (max-width: 576px) {
      .brand-logo {
        height: 32px;
      }

      .brand-logo-nm {
        transform: scale(2);
        margin-left: -10px;
      }

      .navbar-actions {
        gap: 8px;
      }

      .icon-btn {
        width: 36px;
        height: 36px;
      }

      .cart-btn-nav {
        padding: 4px 10px !important;
      }
    }

    .icon-btn {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      background: rgba(255, 255, 255, .06) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      text-decoration: none;
      transition: all .2s ease;
    }

    body.light-theme .icon-btn {
      background: rgba(0, 0, 0, .04) !important;
    }

    .icon-btn:hover {
      background: rgba(255, 255, 255, .1) !important;
      transform: translateY(-2px);
    }

    /* Header Actions */
    .cart-header-actions {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 20px 0;
      gap: 15px;
    }

    .header-center {
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .header-right {
      text-align: right;
    }

    @media (max-width: 768px) {
      .cart-header-actions {
        grid-template-columns: auto 1fr;
        grid-template-areas: "back right" "center center";
        row-gap: 20px;
      }

      .header-left {
        grid-area: back;
      }

      .header-right {
        grid-area: right;
      }

      .header-center {
        grid-area: center;
        justify-content: center;
      }
    }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255, 255, 255, .05) !important;
      border: 1px solid var(--border) !important;
      border-radius: 50px;
      color: var(--text) !important;
      text-decoration: none;
      font-size: 0.9rem;
      width: fit-content;
    }

    /* Item Card */
    .wl-item {
      background: var(--panel) !important;
      border: 1px solid var(--border) !important;
      border-radius: 20px;
      padding: 15px;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      transition: all 0.3s ease;
    }

    @media (max-width: 576px) {
      .wl-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 15px;
      }

      .wl-item img {
        width: 100%;
        height: 200px;
      }

      .wl-item .flex-grow-1 {
        width: 100%;
      }
    }

    .wl-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
    }

    .wl-item img {
      width: 100px;
      height: 120px;
      object-fit: cover;
      border-radius: 16px;
    }

    .size-badge {
      font-size: 11px;
      padding: 4px 12px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50px;
      font-weight: 600;
    }

    body.light-theme .size-badge {
      background: rgba(0, 0, 0, 0.05);
    }

    /* Qty Controls */
    .qty-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      width: fit-content;
    }

    body.light-theme .qty-controls {
      background: rgba(0, 0, 0, 0.03);
      border-color: rgba(15, 23, 42, 0.15);
    }

    .qty-btn {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      padding: 0 4px;
    }

    .qty-btn:hover {
      color: var(--accent);
    }

    /* Summary */
    .wl-summary {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 30px;
      position: sticky;
      top: 110px;
    }

    @media (max-width: 992px) {
      .wl-summary {
        position: static;
        margin-top: 20px;
      }
    }

    /* Helpers */
    .text-muted {
      color: var(--muted) !important;
    }

    .text-accent {
      color: var(--accent) !important;
    }

    .btn-continue {
      border: 1.5px solid var(--text) !important;
      color: var(--text) !important;
      transition: all .2s;
    }

    .btn-continue:hover {
      background: var(--text) !important;
      color: var(--bg) !important;
    }

    /* Empty state */
    .empty-wl {
      text-align: center;
      padding: 80px 20px;
    }

    .empty-wl-icon {
      font-size: 4rem;
      opacity: 0.15;
      margin-bottom: 25px;
    }
  </style>
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
      <a href="index.html" class="navbar-brand d-flex align-items-center gap-2 m-0">
        <img src="../static/media/Vanta logo png.png" alt="vanta" class="brand-logo">
        <img src="../static/media/vanta .png" alt="vanta" class="brand-logo-nm">
      </a>

      <div class="navbar-actions">
        <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme">
          <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
        </button>
        <a href="wishlist.html" class="icon-btn" title="Wishlist">
          <i class="bi bi-heart"></i>
        </a>
        <a href="cart.html"
          class="btn btn-warning d-flex align-items-center gap-2 px-3 rounded-3 position-relative fw-bold cart-btn-nav">
          <i class="bi bi-bag-fill"></i>
          <span class="d-none d-sm-inline">Cart</span>
          <span id="cart-count" class="badge bg-dark text-white rounded-pill">0</span>
        </a>
      </div>
    </div>
  </nav>

  <!-- Header Actions -->
  <div class="container">
    <div class="cart-header-actions">
      <div class="header-left">
        <a href="javascript:history.back()" class="back-btn">
          <i class="bi bi-arrow-left"></i>
          <span class="fw-bold">Go Back</span>
        </a>
      </div>
      <div class="header-center">
        <i class="bi bi-bag-fill fs-2 text-warning"></i>
        <h1 class="fw-bold mb-0 h3">My Cart</h1>
      </div>
      <div class="header-right">
        <button onclick="clearCart()" id="clear-btn"
          class="btn btn-outline-danger btn-sm rounded-pill px-3 py-2 fw-bold">
          <i class="bi bi-trash3 me-1"></i> <span>Clear Cart</span>
        </button>
      </div>
    </div>
  </div>

  <!-- Content -->
  <div class="container py-4">
    <div class="row g-4">
      <div class="col-lg-8">
        <div id="cart-items"></div>
      </div>
      <div class="col-lg-4">
        <div class="wl-summary shadow-lg">
          <h5 class="fw-bold mb-4">Order Summary</h5>
          <div class="d-flex justify-content-between mb-2">
            <span class="text-muted">Subtotal</span>
            <span id="subtotal" class="fw-bold">₹0</span>
          </div>
          <div class="d-flex justify-content-between mb-3">
            <span class="text-muted">Shipping</span>
            <span class="fw-bold text-success">Free</span>
          </div>
          <hr class="border-secondary opacity-25">
          <div class="d-flex justify-content-between mb-4 mt-3">
            <span class="text-muted">Total</span>
            <span id="total" class="fw-bold fs-4 text-accent">₹0</span>
          </div>
          <a href="summary.html" class="btn btn-warning w-100 py-3 fw-bold rounded-4 mb-3 shadow-sm">
            Proceed to Checkout <i class="bi bi-arrow-right ms-2"></i>
          </a>
          <a href="index.html" class="btn btn-continue w-100 py-2 rounded-3">
            Continue Shopping
          </a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const body = document.body;
      const themeIcon = document.getElementById("themeIcon");
      const toggleBtn = document.getElementById("themeToggle");

      /* ── Theme Logic ── */
      if (!localStorage.getItem("theme")) localStorage.setItem("theme", "dark");

      function applyTheme(theme) {
        if (theme === "light") {
          body.classList.add("light-theme");
          themeIcon.className = "bi bi-sun-fill";
        } else {
          body.classList.remove("light-theme");
          themeIcon.className = "bi bi-moon-stars-fill";
        }
      }

      applyTheme(localStorage.getItem("theme"));

      toggleBtn.addEventListener("click", () => {
        const newTheme = body.classList.contains("light-theme") ? "dark" : "light";
        localStorage.setItem("theme", newTheme);
        applyTheme(newTheme);
      });

      /* ── Cart Logic ── */
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const container = document.getElementById("cart-items");

      function saveCart() {
        localStorage.setItem("cart", JSON.stringify(cart));
        updateCartCount();
      }

      function fmt(amount) {
        return new Intl.NumberFormat("en-IN", {
          style: "currency",
          currency: "INR",
          maximumFractionDigits: 0
        }).format(amount);
      }

      function updateCartCount() {
        let totalQty = cart.reduce((sum, item) => sum + (item.qty || 1), 0);
        document.getElementById("cart-count").innerText = totalQty;

        // Toggle clear button visibility based on cart content
        const clearBtn = document.getElementById("clear-btn");
        if (clearBtn) clearBtn.style.display = totalQty === 0 ? 'none' : 'inline-block';
      }

      function updateTotals() {
        let subtotal = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
        document.getElementById("subtotal").innerText = fmt(subtotal);
        document.getElementById("total").innerText = fmt(subtotal);
      }

      function renderCart() {
        container.innerHTML = "";

        if (cart.length === 0) {
          container.innerHTML = `
                        <div class="empty-wl">
                            <i class="bi bi-cart-x empty-wl-icon d-block"></i>
                            <h3 class="fw-bold">Your cart is empty</h3>
                            <p class="text-muted mb-4">Looks like you haven't added anything yet.</p>
                            <a href="index.html" class="btn btn-warning px-5 py-3 fw-bold rounded-pill shadow">Start Shopping</a>
                        </div>
                    `;
          updateTotals();
          updateCartCount();
          return;
        }

        cart.forEach((item, index) => {
          const div = document.createElement("div");
          div.className = "wl-item shadow-sm position-relative";
          div.innerHTML = `
                        <img src="${item.image}" alt="${item.name}">
                        <div class="flex-grow-1">
                            <div class="d-flex justify-content-between align-items-start mb-1">
                                <h5 class="fw-bold mb-0">${item.name}</h5>
                                <button class="btn btn-link text-danger p-0" onclick="removeItem(${index})">
                                    <i class="bi bi-trash fs-5"></i>
                                </button>
                            </div>
                            
                            <div class="mb-3 d-flex align-items-center gap-2">
                                ${item.size ? `<span class="size-badge">Size: ${item.size}</span>` : ""}
                            </div>
                            
                            <div class="d-flex justify-content-between align-items-center mt-auto">
                                <div class="qty-controls">
                                    <button class="qty-btn" onclick="decreaseQty(${index})"><i class="bi bi-dash"></i></button>
                                    <span class="fw-bold px-2">${item.qty}</span>
                                    <button class="qty-btn" onclick="increaseQty(${index})"><i class="bi bi-plus"></i></button>
                                </div>
                                <span class="fw-bold fs-5">${fmt(item.price * item.qty)}</span>
                            </div>
                        </div>
                    `;
          container.appendChild(div);
        });

        updateTotals();
        updateCartCount();
      }

      window.increaseQty = function (index) {
        cart[index].qty++;
        saveCart();
        renderCart();
      };

      window.decreaseQty = function (index) {
        if (cart[index].qty > 1) {
          cart[index].qty--;
        } else {
          cart.splice(index, 1);
        }
        saveCart();
        renderCart();
      };

      window.removeItem = function (index) {
        cart.splice(index, 1);
        saveCart();
        renderCart();
      };

      window.clearCart = function () {
        if (confirm("Are you sure you want to clear the cart?")) {
          cart = [];
          localStorage.removeItem("cart");
          renderCart();
        }
      };

      renderCart();
    });
  </script>

</body>

</html>
