<!DOCTYPE html>
<html>

<head>
  <title>Kids Collection</title>
  <link rel="stylesheet" href="../static/css/index.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-black px-4">
    <a href="index.html" class="navbar-brand fw-bold">
      <h5 class="offcanvas-title brand m-0 d-flex align-items-center gap-2">
        <img src="../static/media/Vanta logo png.png" alt="" class="brand-logo">
        <img src="../static/media/vanta .png" alt="" class="brand-logo-nm">
      </h5>
    </a>

    <div class="d-flex align-items-center gap-3">
      <button onclick="goBack()" class="btn btn-outline-light btn-sm">← Back</button>
      <a href="cart.html" class="cart-icon text-light text-decoration-none">
        🛒 <span id="cartCount">0</span>
      </a>
    </div>
  </nav>

  <!-- Search & Filter -->
  <section class="container py-4">
    <div class="row g-3">
      <div class="col-md-6">
        <input type="text" id="searchInput" class="form-control" placeholder="Search products...">
      </div>
      <div class="col-md-3">
        <select id="filterCategory" class="form-select">
          <option value="all">All</option>
          <option value="dress">Dress</option>
          <option value="top">Top</option>
        </select>
      </div>
    </div>
  </section>

  <!-- Products -->
  <section class="container pb-5">
    <div class="row g-4 ">

      <!-- PRODUCT 3 (Kids Denim Set) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=3" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img
              src="https://jujujam.in/cdn/shop/files/Denim_on_Denim_Boys_and_Girls_Classy_Co-ord_Set_3.jpg?v=1754491490&width=1100"
              alt="kids jeans set" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Kids Denim Set</h6>
              <p class="text-muted small mb-2">Kids • Trendy</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class=" fw-bold product-price">₹999</span>
                <span class="rating">4.7 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- PRODUCT 6 (Kids Summer Set) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=6" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img src="https://tse4.mm.bing.net/th/id/OIP.eJ4mIEzm5rAG0JqS6Ucn4gHaHa?rs=1&pid=ImgDetMain&o=7&rm=3"
              alt="kids summer set" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Kids Summer Set</h6>
              <p class="text-muted small mb-2">Kids • Comfort</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold product-price">₹ 799</span>
                <span class="rating">4.6 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>
      <!-- PRODUCT 11 (Kids Kurta Set) -->
      <div class="col-md-3 col-6">
        <a href="product-details.html?id=11" class="text-decoration-none text-dark">
          <div class="card-custom p-3">
            <img
              src="https://images.pexels.com/photos/3667816/pexels-photo-3667816.jpeg?auto=compress&cs=tinysrgb&w=1200"
              alt="kids kurta set" />
            <div class="product-name">
              <h6 class="fw-bold mb-1">Kids Kurta Set</h6>
              <p class="text-muted small mb-2">Kids • Ethnic</p>
              <div class="d-flex justify-content-between align-items-center">
                <span class="fw-bold product-price">₹ 999</span>
                <span class="rating">4.7 ★</span>
              </div>
            </div>
          </div>
        </a>
      </div>

    </div>
  </section>




  <script src="../static/script/women.js"></script>
</body>

</html>
