<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Wishlist - Vanta The Posh</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <style>
        :root {
            --bg: #0b0f17;
            --panel: #080a11;
            --text: #e5e7eb;
            --muted: #9ca3af;
            --border: rgba(255, 255, 255, .08);
            --accent: #ff3d6e;
        }

        body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }

        body.light-theme {
            --bg: #f6f7fb;
            --panel: #ffffff;
            --text: #0f172a;
            --muted: #475569;
            --border: rgba(15, 23, 42, .10);
        }

        /* Navbar */
        .navbar {
            background: rgba(11, 15, 23, .85) !important;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            padding: 10px 0;
        }

        body.light-theme .navbar {
            background: rgba(255, 255, 255, .9) !important;
        }

        .brand-logo {
            height: 40px;
            width: auto;
            object-fit: contain;
        }

        .brand-logo-nm {
            height: 40px;
            width: auto;
            object-fit: contain;
            transform: scale(2.5);
            transform-origin: left center;
            margin-left: -15px;
            filter: brightness(0) invert(1);
        }

        body.light-theme .brand-logo-nm {
            filter: none;
        }

        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        @media (max-width: 576px) {
            .brand-logo {
                height: 32px;
            }

            .brand-logo-nm {
                transform: scale(2);
                margin-left: -10px;
            }

            .navbar-actions {
                gap: 8px;
            }

            .icon-btn {
                width: 36px;
                height: 36px;
            }

            .cart-btn-nav {
                padding: 4px 10px !important;
            }
        }

        .icon-btn {
            width: 40px;
            height: 40px;
            display: grid;
            place-items: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, .06) !important;
            border: 1px solid var(--border) !important;
            color: var(--text) !important;
            text-decoration: none;
            transition: all .2s ease;
        }

        body.light-theme .icon-btn {
            background: rgba(0, 0, 0, .04) !important;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, .1) !important;
            transform: translateY(-2px);
        }

        /* Header Actions */
        .wl-header-actions {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 20px 0;
            gap: 15px;
        }

        .header-center {
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }

        .header-right {
            text-align: right;
        }

        @media (max-width: 768px) {
            .wl-header-actions {
                grid-template-columns: auto 1fr;
                grid-template-areas: "back right" "center center";
                row-gap: 20px;
            }

            .header-left {
                grid-area: back;
            }

            .header-right {
                grid-area: right;
            }

            .header-center {
                grid-area: center;
                justify-content: center;
            }
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: rgba(255, 255, 255, .05) !important;
            border: 1px solid var(--border) !important;
            border-radius: 50px;
            color: var(--text) !important;
            text-decoration: none;
            font-size: 0.9rem;
            width: fit-content;
        }

        /* Item Card */
        .wl-item {
            background: var(--panel) !important;
            border: 1px solid var(--border) !important;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s ease;
        }

        @media (max-width: 576px) {
            .wl-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }

            .wl-item img {
                width: 100%;
                height: 200px;
            }

            .wl-item .flex-grow-1 {
                width: 100%;
            }
        }

        .wl-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .wl-item img {
            width: 100px;
            height: 120px;
            object-fit: cover;
            border-radius: 16px;
        }

        .size-badge {
            font-size: 11px;
            padding: 4px 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            font-weight: 600;
        }

        body.light-theme .size-badge {
            background: rgba(0, 0, 0, 0.05);
        }

        /* Summary */
        .wl-summary {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 28px;
            padding: 30px;
            position: sticky;
            top: 110px;
        }

        @media (max-width: 992px) {
            .wl-summary {
                position: static;
                margin-top: 20px;
            }
        }

        /* Helpers */
        .text-muted {
            color: var(--muted) !important;
        }

        .text-accent {
            color: var(--accent) !important;
        }

        .btn-continue {
            border: 1.5px solid var(--text) !important;
            color: var(--text) !important;
            transition: all .2s;
        }

        .btn-continue:hover {
            background: var(--text) !important;
            color: var(--bg) !important;
        }

        /* Empty state */
        .empty-wl {
            text-align: center;
            padding: 80px 20px;
        }

        .empty-wl-icon {
            font-size: 4rem;
            opacity: 0.15;
            margin-bottom: 25px;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar sticky-top">
        <div class="container d-flex justify-content-between align-items-center">
            <a href="index.html" class="navbar-brand d-flex align-items-center gap-2 m-0">
                <img src="../static/media/Vanta logo png.png" alt="vanta" class="brand-logo">
                <img src="../static/media/vanta .png" alt="vanta" class="brand-logo-nm">
            </a>

            <div class="navbar-actions">
                <button class="icon-btn theme-toggle" id="themeToggle" title="Toggle theme">
                    <i class="bi bi-moon-stars-fill" id="themeIcon"></i>
                </button>
                <a href="wishlist.html" class="icon-btn" title="Wishlist">
                    <i class="bi bi-heart-fill text-danger"></i>
                </a>
                <a href="cart.html"
                    class="btn btn-warning d-flex align-items-center gap-2 px-3 rounded-3 position-relative fw-bold cart-btn-nav">
                    <i class="bi bi-bag"></i>
                    <span class="d-none d-sm-inline">Cart</span>
                    <span id="cart-count" class="badge bg-dark text-white rounded-pill">0</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- Header Actions -->
    <div class="container">
        <div class="wl-header-actions">
            <div class="header-left">
                <a href="javascript:history.back()" class="back-btn">
                    <i class="bi bi-arrow-left"></i>
                    <span class="fw-bold">Go Back</span>
                </a>
            </div>
            <div class="header-center">
                <i class="bi bi-heart-fill fs-2 text-danger"></i>
                <h1 class="fw-bold mb-0 h3">My Wishlist</h1>
            </div>
            <div class="header-right">
                <p class="mb-0 text-muted small fw-bold" id="wl-subtitle">Loading...</p>
            </div>
        </div>
    </div>

    <!-- Content -->
    <div class="container py-4">
        <div class="row g-4">
            <div class="col-lg-8">
                <div id="wishlist-items"></div>
            </div>
            <div class="col-lg-4">
                <div class="wl-summary shadow-lg">
                    <h5 class="fw-bold mb-4">Summary</h5>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Total items</span>
                        <span id="wl-count" class="fw-bold">0</span>
                    </div>
                    <div class="d-flex justify-content-between mb-4">
                        <span class="text-muted">Total value</span>
                        <span id="wl-total" class="fw-bold fs-5 text-accent">₹0</span>
                    </div>
                    <button onclick="moveAllToCart()"
                        class="btn btn-warning w-100 py-3 fw-bold rounded-4 mb-3 shadow-sm">
                        <i class="bi bi-cart-plus-fill me-2"></i>Move All to Cart
                    </button>
                    <a href="index.html" class="btn btn-continue w-100 py-2 rounded-3">
                        Continue Shopping
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function () {
            const body = document.body;
            const themeIcon = document.getElementById("themeIcon");
            const toggleBtn = document.getElementById("themeToggle");

            /* ── Theme Logic ── */
            if (!localStorage.getItem("theme")) localStorage.setItem("theme", "dark");

            function applyTheme(theme) {
                if (theme === "light") {
                    body.classList.add("light-theme");
                    themeIcon.className = "bi bi-sun-fill";
                } else {
                    body.classList.remove("light-theme");
                    themeIcon.className = "bi bi-moon-stars-fill";
                }
            }

            applyTheme(localStorage.getItem("theme"));

            toggleBtn.addEventListener("click", () => {
                const newTheme = body.classList.contains("light-theme") ? "dark" : "light";
                localStorage.setItem("theme", newTheme);
                applyTheme(newTheme);
            });

            /* ── Wishlist Logic ── */
            let wishlist = JSON.parse(localStorage.getItem("wishlist")) || [];

            function fmt(n) {
                return new Intl.NumberFormat("en-IN", {
                    style: "currency",
                    currency: "INR",
                    maximumFractionDigits: 0
                }).format(n);
            }

            function updateCartCount() {
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                let total = cart.reduce((s, i) => s + (i.qty || 1), 0);
                document.getElementById("cart-count").innerText = total;
            }
            updateCartCount();

            function render() {
                const container = document.getElementById("wishlist-items");
                container.innerHTML = "";

                if (wishlist.length === 0) {
                    container.innerHTML = `
            <div class="empty-wl">
              <i class="bi bi-heart empty-wl-icon d-block"></i>
              <h3 class="fw-bold">Your wishlist is empty</h3>
              <p class="text-muted mb-4">Explore our collections and save your favorites here!</p>
              <a href="index.html" class="btn btn-warning px-5 py-3 fw-bold rounded-pill shadow">Start Shopping</a>
            </div>`;
                    updateSummary();
                    return;
                }

                wishlist.forEach((item, idx) => {
                    const div = document.createElement("div");
                    div.className = "wl-item shadow-sm";
                    div.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <div class="flex-grow-1">
              <div class="d-flex justify-content-between align-items-start mb-1">
                <h6 class="fw-bold mb-0">${item.name}</h6>
                <button class="btn btn-link text-danger p-0" onclick="removeItem(${idx})">
                  <i class="bi bi-trash"></i>
                </button>
              </div>
              <div class="mb-2">
                <span class="size-badge">Size: ${item.size}</span>
                <span class="small text-muted ms-2">Qty: ${item.qty}</span>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="fw-bold fs-5">${fmt(item.price * item.qty)}</span>
                <button class="btn btn-dark btn-sm rounded-pill px-3" onclick="moveToCart(${idx})">
                  Move to Cart
                </button>
              </div>
            </div>`;
                    container.appendChild(div);
                });

                updateSummary();
            }

            function updateSummary() {
                const count = wishlist.length;
                const total = wishlist.reduce((s, i) => s + (i.price * i.qty), 0);
                document.getElementById("wl-count").innerText = count;
                document.getElementById("wl-total").innerText = fmt(total);
                const txt = count === 0 ? "No items saved yet" : `${count} item${count > 1 ? "s" : ""} saved`;
                const subtitle = document.getElementById("wl-subtitle");
                if (subtitle) subtitle.innerText = txt;
            }

            window.removeItem = function (idx) {
                wishlist.splice(idx, 1);
                localStorage.setItem("wishlist", JSON.stringify(wishlist));
                render();
            };

            window.moveToCart = function (idx) {
                const item = wishlist[idx];
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                let existing = cart.find(c => c.name === item.name && c.size === item.size);
                if (existing) { existing.qty += item.qty; } else { cart.push({ ...item }); }
                localStorage.setItem("cart", JSON.stringify(cart));
                wishlist.splice(idx, 1);
                localStorage.setItem("wishlist", JSON.stringify(wishlist));
                render();
                updateCartCount();
            };

            window.moveAllToCart = function () {
                if (wishlist.length === 0) return;
                let cart = JSON.parse(localStorage.getItem("cart")) || [];
                wishlist.forEach(item => {
                    let ex = cart.find(c => c.name === item.name && c.size === item.size);
                    if (ex) { ex.qty += item.qty; } else { cart.push({ ...item }); }
                });
                localStorage.setItem("cart", JSON.stringify(cart));
                localStorage.removeItem("wishlist");
                window.location.href = "cart.html";
            };

            render();
        });
    </script>
</body>

</html>
