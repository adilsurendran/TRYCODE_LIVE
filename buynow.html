<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout</title>

<link rel="stylesheet" href="buynow.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="light">

<div class="checkout-wrapper container">

  <!-- NAV BUTTONS -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <button onclick="history.back()" class="nav-btn">
      ← Back
    </button>

    <a href="index.html" class="nav-btn text-decoration-none">
      Home
    </a>
  </div>

  <div class="row g-4 align-items-start">

    <!-- ORDER SUMMARY -->
    <div class="col-lg-4 order-1 order-lg-2">
      <div class="checkout-card">

        <h5 class="mb-4">Order Summary</h5>

       <div id="order-items"></div>

<hr>

<div class="summary-row">
  <span>Price</span>
  <span id="subtotal">₹0</span>
</div>

<div class="summary-row">
  <span>Delivery</span>
  <span id="delivery">₹40</span>
</div>

<div class="summary-row">
  <span>Tax (5%)</span>
  <span id="tax">₹0</span>
</div>

<hr>

<div class="summary-row summary-total">
  <span>Total</span>
  <span id="grand-total">₹0</span>
</div>
      </div>
    </div>

    <!-- SHIPPING DETAILS -->
    <div class="col-lg-8 order-2 order-lg-1">
      <div class="checkout-card">

        <h4 class="mb-4">Shipping Details</h4>

        <input class="form-control checkout-input mb-3" placeholder="Full Name">
        <input class="form-control checkout-input mb-3" placeholder="Phone Number">
        <input class="form-control checkout-input mb-3" placeholder="Address">
        <input class="form-control checkout-input mb-3" placeholder="City">
        <input class="form-control checkout-input mb-3" placeholder="Pincode">

        <button class="checkout-btn w-100 mt-3">
          Place Order
        </button>

      </div>
    </div>

  </div>
</div>
<script>
document.addEventListener("DOMContentLoaded", function () {

  let container = document.getElementById("order-items");

  let product = JSON.parse(localStorage.getItem("buyNowItem"));

  if(!product){
    container.innerHTML = "<p>No product selected 😕</p>";
    return;
  }

  let subtotal = product.price * product.qty;
  let delivery = 40;
  let tax = Math.round(subtotal * 0.05);
  let total = subtotal + delivery + tax;

  container.innerHTML = `
    <div class="product-box d-flex gap-3 mb-3">
      <img src="${product.image}" class="product-img">
      <div>
        <h6 class="mb-1">${product.name}</h6>
        <small>Size: ${product.size}</small><br>
        <small>Qty: ${product.qty}</small><br>
        <small>₹ ${product.price}</small>
      </div>
    </div>
  `;

  document.getElementById("subtotal").innerText = "₹" + subtotal;
  document.getElementById("tax").innerText = "₹" + tax;
  document.getElementById("grand-total").innerText = "₹" + total;

  // PLACE ORDER
  document.querySelector(".checkout-btn").addEventListener("click", function(){

    let inputs = document.querySelectorAll(".checkout-input");
    let valid = true;

    inputs.forEach(input=>{
      if(input.value.trim()===""){
        input.style.border="1px solid red";
        valid=false;
      } else {
        input.style.border="1px solid #ccc";
      }
    });

    if(!valid){
      alert("Fill all details ⚠");
      return;
    }

    alert("Order placed successfully 🎉");

    localStorage.removeItem("buyNowItem");

    window.location.href="index.html";
  });

});
</script>
</body>
</html>
